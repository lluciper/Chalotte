name: chalotte
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.17.5 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Icon
  cupertino_icons: ^1.0.2

  # UI
  html: ^0.15.0
  bottom_navy_bar: ^6.0.0
  snapping_sheet: ^3.1.0
  cached_network_image: ^3.2.0

  # Dart data class
  json_serializable: ^6.3.1
  json_annotation: ^4.6.0

  # Info package
  package_info_plus: ^1.4.2
  device_info: ^2.0.3

  # Network
  connectivity_plus: ^2.3.6

  # Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Value equality
  equatable: ^2.0.3

  # State management
  bloc: ^8.0.3
  flutter_bloc: ^8.0.1

  # Remote API
  dio: ^4.0.6

  # Dependency Injection
  get_it: ^7.2.0
  injectable: ^1.5.3

  # Permission app
  permission_handler: ^10.0.0

  # Logger
  pretty_dio_logger: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints:
    ^2.0.0

    # Code generators
  hive_generator: ^1.1.3
  build_runner: ^2.2.0
  injectable_generator: ^1.5.4

  # Gen assets
  flutter_gen_runner:

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Light.ttf
          weight: 300
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-Black.ttf
          weight: 900
        - asset: assets/fonts/Montserrat-Italic.ttf
          style: italic
